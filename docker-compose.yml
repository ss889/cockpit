services:
  web:
    build:
      context: .
      target: runner
    image: ai-career-cockpit:latest
    ports:
      - '3000:3000'
    environment:
      - ANTHROPIC_API_KEY
      - ANTHROPIC_MODEL=claude-3-haiku-20240307
      - OPENAI_API_KEY
    env_file:
      - .env.local
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    image: ai-career-cockpit-worker:latest
    environment:
      - ANTHROPIC_API_KEY
      - ANTHROPIC_MODEL=claude-3-haiku-20240307
      - OPENAI_API_KEY
    env_file:
      - .env.local
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://web:3000/api/worker/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
